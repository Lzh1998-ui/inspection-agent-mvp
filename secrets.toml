# Streamlit Secrets 文件
# 用于存储敏感信息（如API Key）
# ⚠️ 不要提交这个文件到 GitHub！

# 优先级1：通义千问VL（支持视觉，便宜）
[qwen]
api_key = "sk-你的真实通义千问API_Key"  # ← 把这行替换成你的真实Key

# 优先级2：DeepSeek（便宜，仅文本）
[deepseek]
api_key = "sk-你的DeepSeek_API_Key放在这里"

# 优先级3：OpenAI（贵，但稳定）
[openai]
api_key = "sk-你的OpenAI_API_Key放在这里"

